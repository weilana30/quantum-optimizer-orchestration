    name: wisq_rules
    target_gateset: IBMN
    optimization_objective: TWO_Q
    approx_epsilon: 0
    opt_timeout: 180
  save_intermediates: true
  output_dir: brute_force_chains/wisq_optimization/full_run/one_opt_wisq/batch_2/reports/chains/wisq_rules
- name: wisq_bqskit
